<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ujian Benar/Salah: Boiler & K3</title>
    <style>
:root {
        --primary: #2563eb;
        --success: #16a34a;
        --danger: #dc2626;
        --bg: #f1f5f9;
    }
        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: #1e293b;
            padding: 20px;
            display: flex;
            justify-content: center;
        }
        .container {
            max-width: 700px;
            width: 100%;
            background: white;
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
        }
        header {
            border-bottom: 2px solid #eee;
            padding-bottom: 15px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .stat-badge {
            background: #eff6ff;
            color: var(--primary);
            padding: 5px 15px;
            border-radius: 20px;
            font-weight: bold;
        }
        .pertanyaan-box {
            min-height: 150px;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 20px;
            border-radius: 12px;
            transition: background-color 0.3s ease;
            margin-bottom: 20px;
        }
        .pertanyaan-text {
            font-size: 1.3rem;
            font-weight: 600;
            line-height: 1.5;
        }
        .btn-group {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
        }
        .btn-bs {
            flex: 1;
            padding: 25px;
            border: none;
            border-radius: 12px;
            font-size: 1.4rem;
            font-weight: 800;
            cursor: pointer;
            transition: 0.2s;
            color: white;
        }
        .btn-benar {
            background: var(--success);
            box-shadow: 0 4px 0 #15803d;
        }
        .btn-salah {
            background: var(--danger);
            box-shadow: 0 4px 0 #b91c1c;
        }
        .btn-bs:active {
            transform: translateY(4px);
            box-shadow: none;
        }

        /* Navigasi Style */
        .nav-group {
            display: flex;
            justify-content: space-between;
            border-top: 1px solid #eee;
            padding-top: 20px;
        }
        .btn-nav {
            padding: 10px 20px;
            border: 1px solid #ccc;
            background: white;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
        }
        .btn-nav:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }

        #hasil-akhir {
            display: none;
        }
        .skor-container {
            text-align: center;
            margin-bottom: 30px;
        }
        .skor-angka {
            font-size: 5rem;
            font-weight: 900;
            color: var(--primary);
            margin: 0;
        }
        .review-card {
            border: 1px solid #e2e8f0;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 10px;
            text-align: left;
        }
        .status-label {
            font-size: 0.8rem;
            font-weight: bold;
            text-transform: uppercase;
            margin-bottom: 5px;
            display: block;
        }
    </style>
</head>
<body>

    <div class="container">
        <div id="quiz-area">
            <header>
                <div style="font-weight: 800; font-size: 1.1rem;">
                    TRUE OR FALSE
                </div>
                <div class="stat-badge" id="counter">
                    1 / 37
                </div>
            </header>

            <div class="pertanyaan-box" id="box-soal">
                <div class="pertanyaan-text" id="teks-soal">
                    Memuat soal...
                </div>
            </div>

            <div class="btn-group">
                <button class="btn-bs btn-benar" onclick="cek(true)">BENAR</button>
                <button class="btn-bs btn-salah" onclick="cek(false)">SALAH</button>
            </div>

            <div class="nav-group">
                <button class="btn-nav" id="btn-kembali" onclick="kembali()">← Kembali</button>
                <button class="btn-nav" id="btn-lanjut" onclick="lanjut()" disabled>Lanjut →</button>
            </div>
        </div>

        <div id="hasil-akhir">
            <div class="skor-container">
                <h2>Hasil Ujian Anda</h2>
                <p class="skor-angka" id="skor-display">
                    0
                </p>
                <button onclick="location.reload()" style="margin-top:20px; padding:10px 25px; cursor:pointer; border-radius:8px; border:1px solid #ccc;">Ulangi Latihan</button>
            </div>
            <hr>
            <div id="review-list"></div>
        </div>
    </div>

    <script>
        const bankSoal = [{
            q: "Saat Boiler berhenti mengisi air, Seharusnya valve Recirculation Economizer di buka",
            a: true
        },
            {
                q: "Setelah main steam pipe terisolasi, dapat mencegah terjadinya proses perpindahan panas",
                a: false
            },
            {
                q: "Kandungan garam kritis di dalam air boiler berhubungan dengan beban boiler: semakin tinggi beban, semakin rendah kandungan garam kritis air boiler",
                a: false
            },
            {
                q: "Untuk boiler yang sama, saat beban rendah kehilangan panas lebih kecil",
                a: false
            },
            {
                q: "Beban boiler terlalu tinggi, terlalu rendah, dan kehilangan panas dari bahan bakar yang mudah terbakar di fly ash meningkat",
                a: false
            },
            {
                q: "Setelah SAF dinyalakan, sekat outletnya dengan beban harus dibuka, untuk mencegah operasi blower aliran rendah terus menerus, yang akan menyebabkan impeler blower menjadi terlalu panas dan rusak",
                a: true
            },
            {
                q: "Suhu berlebih mengacu pada operasi, pemanasan berlebih mengacu pada ledakan tabung, suhu berlebih adalah penyebab panas berlebih. Terlalu panas adalah hasil dari suhu berlebih",
                a: true
            },
            {
                q: "Bahan bakar batubara harus berventilasi menyeluruh sebelum penyalaan Boiler, waktu ventilasi harus lebih dari 5 menit, dan volume ventilasi harus lebih dari 30% dari nilai ditentukan.",
                a: true
            },
            {
                q: "Jika abu, terak atau kotoran pada permukaan pemanas dinding air, suhu gas buang di outlet furnace akan berkurang",
                a: false
            },
            {
                q: "Kehilangan panas terbesar dari boiler pembangkit listrik adalah kehilangan panas dari pembakaran mekanis yang tidak sempurna.",
                a: false
            },
            {
                q: "Jika pintu gas buang pada superheater dibuka 100% dan pintu gas buang pada reheter ditutup 50% maka suhu pada superheater meningkat dan pada reheater menurun",
                a: true
            },
            {
                q: "Fungsi dari PAF: adalah sumber tenaga penggerak aliran kolaborasi udara dan serbuk dalam system produksi serbuk batubara, untuk mengatasi hambatan pada saat proses pengaliran,dan juga untuk menggeringkan dan mengantarkan serbuk",
                a: true
            },
            {
                q: "Persyaratan emergency shutdown PAF adalah Suhu bearing motor meningkat tajam Bearing kipas berasap,motor kipas berasap",
                a: true
            },
            {
                q: "Power rated motor IDF yaitu 4000kW serta arus ratednya 280A",
                a: false
            },
            {
                q: "Semua suhu bantalan untuk peralatan berkipas adalah sama",
                a: false
            },
            {
                q: "Salah satu kegunaan inspeksi adalah untuk memastikan data yang ada dilapangan dan monitor sinkron serta mencegah kecacatan peralatan",
                a: true
            },
            {
                q: "Dalam pengisian air ke boiler, ketika level air ditangki penyimpanan mencapai 6 meter, aktifkan 361 ke mode otomatis, dan pastikan pengaturan level air otomatis berjalan normal",
                a: true
            },
            {
                q: "Dalam pengapian dan pembersihan boiler dalam kondisi dingin, nyalakan IDF. Nyalakan blower pemanas udara dan sesuaikan total aliran udara diatas 50% B-MCR",
                a: false
            },
            {
                q: "Pengapian dan pembersihan boiler dalam kondisi dingin katup pengatur oli dan katup pengatur oli pengembalian tidak perlu dibuka",
                a: false
            },
            {
                q: "Saat pembersihan boiler dalam kondisi panas perlu menyesuaikan aliran masuk ekonomizer boiler hingga 245t/h",
                a: true
            },
            {
                q: "Saat pembersihan boiler dalam kondisi panas ketika tekanan uap superheater mencapai 0,2Mpa, tidak perlu menutup semua katup udara boiler",
                a: false
            },
            {
                q: "Selama proses pembersihan panas, pertahankan aliran pembersihan pada 25% B-MCR",
                a: true
            },
            {
                q: "Ketika suhu angin PAF mencapai 170℃, hentikan operasi pemanas udara grinding A",
                a: true
            },
            {
                q: "Sebelum menyalakan boiler tidak perlu memeriksa level batubara di bangker batubara",
                a: false
            },
            {
                q: "Menyalakan CCTV untuk pemantauan sebelum menyalakan boiler tidak diperlukan",
                a: false
            },
            {
                q: "Simbol K3 yang berwarna kuning menandakan peringatan kewaspadaan",
                a: true
            },
            {
                q: "Upaya pencegahan lebih baik daripada upaya pengobatan terhadap kecelakaan atau akibat kerja, sebagai alternatif terakhir dari pencegahan dalam hirarki pengendalian bahaya adalah Alat Pelindung Diri.",
                a: true
            },
            {
                q: "Pekerja yang perlu waktu menyelesaikan pekerjaan 5-10 menit tidak perlu menggunakan APD.",
                a: false
            },
            {
                q: "Tindakan pembetulan dan pencegahan yang mendasar merupakan salah satu keuntungan dari Inspeksi",
                a: true
            },
            {
                q: "Safety line kuning artinya area berbahaya dimana setiap orang yang melintas harus berhati-hati",
                a: true
            },
            {
                q: "Setiap kecelakaan yang terjadi, maka akan ada rekomendasi atau tindakan perbaikan dari kecelakaan tersebut, tujuan dari rekomendasi tindakan perbaikan adalah Agar kecelakaan Tersebut Tidak Terulang Kembali",
                a: true
            },
            {
                q: "Warna biru yang digunakan dalam sign menandakan “Kewajiban”",
                a: true
            },
            {
                q: "Mangkir 2 hari dapat dikenakan sanski Surat Peringatan III",
                a: false
            },
            {
                q: "Karyawan tidak dibenarkan mengoperasikan unit/alat tanpa memiliki SIMPER",
                a: true
            },
            {
                q: "Mangkir 1 hari dapat dikenakan sanksi Surat Teguran",
                a: false
            },
            {
                q: "Masa berlaku Surat Peringatan I, Surat Peringatan II, Surat Peringatan III adalah 6 bulan",
                a: true
            },
            {
                q: "Masa berlaku Perjanjian Kerja Bersama (PKB) adalah 1 tahun",
                a: false
            }];

        let idx = 0;
        let skor = 0;
        let progresMaksimal = 0; // Menyimpan seberapa jauh user sudah menjawab benar
        let kaliIniSalah = false;

        function tampilkan() {
            document.getElementById("counter").innerText = `${idx + 1} / ${bankSoal.length}`;
            document.getElementById("teks-soal").innerText = bankSoal[idx].q;
            document.getElementById("box-soal").style.backgroundColor = "transparent";

            // Atur tombol navigasi
            document.getElementById("btn-kembali").disabled = (idx === 0);
            // Tombol lanjut hanya aktif jika soal ini sudah pernah dijawab benar sebelumnya
            document.getElementById("btn-lanjut").disabled = (idx >= progresMaksimal);

            kaliIniSalah = false;
        }

        function cek(jawaban) {
            const soalSekarang = bankSoal[idx];
            const box = document.getElementById("box-soal");

            if (jawaban === soalSekarang.a) {
                box.style.backgroundColor = "#dcfce7";

                if (!kaliIniSalah && idx === progresMaksimal) {
                    skor++;
                }

                // Update progres jika user berhasil menjawab soal baru
                if (idx === progresMaksimal) {
                    progresMaksimal++;
                }

                document.getElementById("btn-lanjut").disabled = false;

                setTimeout(() => {
                    lanjut();
                }, 600);
            } else {
                kaliIniSalah = true;
                box.style.backgroundColor = "#fee2e2";
                alert("Jawaban salah! Pelajari lagi soal ini.");
            }
        }

        function lanjut() {
            if (idx < bankSoal.length - 1) {
                idx++;
                tampilkan();
            } else if (idx === bankSoal.length - 1 && progresMaksimal === bankSoal.length) {
                finish();
            }
        }

        function kembali() {
            if (idx > 0) {
                idx--;
                tampilkan();
            }
        }

        function finish() {
            document.getElementById("quiz-area").style.display = "none";
            document.getElementById("hasil-akhir").style.display = "block";
            document.getElementById("skor-display").innerText = Math.round((skor/bankSoal.length)*100);

            const list = document.getElementById("review-list");
            list.innerHTML = "";
            bankSoal.forEach((s, i) => {
                list.innerHTML += `
                <div class="review-card" style="border-left: 5px solid var(--success)">
                <span class="status-label" style="color:var(--success)">Selesai</span>
                <div><strong>${i+1}.</strong> ${s.q}</div>
                <div style="margin-top:10px; font-size:0.9rem;">
                Kunci: <b style="color:var(--success)">${s.a ? 'BENAR': 'SALAH'}</b>
                </div>
                </div>`;
            });
        }

        tampilkan();
    </script>
</body>
</html>
