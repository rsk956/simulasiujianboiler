            margin: 0;
            padding: 0;
            color: #1e293b;
        }

        header {

            color: white;
            padding: 25px;
            text-align: center;
        }

            justify-content: center;
            background: white;
            border-bottom: 2px solid #e2e8f0;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .menu-item {
            padding: 15px 25px;
            cursor: pointer;
            font-weight: 600;
            color: var(--secondary);
            border-bottom: 3px solid transparent;
            transition: 0.3s;
        }

        .menu-item.active {
            color: var(--primary);
            border-bottom-color: var(--primary);
            background: #f1f5f9;
        }

        .content-container {
            max-width: 900px;
            margin: 30px auto;
            padding: 20px;
            background: white;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            min-height: 500px;
        }

        /* Utility classes dari file asli */
        .stat-badge {
            background: #eff6ff;
            color: var(--primary);
            padding: 5px 15px;
            border-radius: 20px;
            font-weight: bold;
        }
        .btn-group {
            display: flex;
            gap: 20px;
            margin-top: 30px;
        }
        .btn-bs {
            flex: 1;
            padding: 20px;
            border: none;
            border-radius: 12px;
            font-size: 1.2rem;
            font-weight: 800;
            cursor: pointer;
            color: white;
        }
        .btn-benar {
            background: var(--success);
            box-shadow: 0 4px 0 #15803d;
        }
        .btn-salah {
            background: var(--danger);
            box-shadow: 0 4px 0 #b91c1c;
        }
        .pilihan-container {
            display: grid;
            gap: 10px;
            margin-top: 20px;
        }
        .pilihan-item, .pilihan-btn {
            padding: 15px;
            border: 2px solid #e2e8f0;
            border-radius: 10px;
            background: white;
            cursor: pointer;
            text-align: left;
            width: 100%;
            font-family: inherit;
            font-size: 1rem;
        }
        .pilihan-item.selected, .pilihan-btn.active {
            border-color: var(--primary);
            background: #eff6ff;
        }
        .footer-nav {
            margin-top: 30px;
            display: flex;
            gap: 10px;
            padding-top: 20px;
            border-top: 2px solid #f1f5f9;
        }
        .btn-nav {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
        }

            text-align: center;
        }
        .skor-angka {
            font-size: 4rem;
            font-weight: 900;
            color: var(--primary);
        }

            border: 1px solid #e2e8f0;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 10px;
            text-align: left;
        }

        .hidden {
            display: none;

        let modeAktif = 'pilihan-ganda';
        let idxSkg = 0;
        let jawabanUser = [];

        function switchTab(mode) {
            modeAktif = mode;
            idxSkg = 0;
            jawabanUser = [];

            document.querySelectorAll('.menu-item').forEach(m => m.classList.remove('active'));
            event.currentTarget.classList.add('active');

            document.getElementById('quiz-content').classList.remove('hidden');
            document.getElementById('hasil-area').classList.add('hidden');
            document.getElementById('quiz-type-label').innerText = mode.replace('-', ' ');

            renderSoal();
        }

        function renderSoal() {
            const soal = bankSoal[modeAktif][idxSkg];
            const total = bankSoal[modeAktif].length;

            document.getElementById('counter').innerText = `${idxSkg + 1} / ${total}`;
            document.getElementById('pertanyaan-box').innerText = soal.q;

            const opsiArea = document.getElementById('opsi-area');
            opsiArea.innerHTML = "";

            if (modeAktif === 'benar-salah') {
                opsiArea.innerHTML = `
                <div class="btn-group">
                <button class="btn-bs btn-benar ${jawabanUser[idxSkg] === true ? 'active': ''}" onclick="simpanBS(true)">BENAR</button>
                <button class="btn-bs btn-salah ${jawabanUser[idxSkg] === false ? 'active': ''}" onclick="simpanBS(false)">SALAH</button>
                </div>
                `;
            } else if (modeAktif === 'pilihan-ganda') {
                const container = document.createElement('div');
                container.className = "pilihan-container";
                soal.a.forEach((teks, i) => {
                    const btn = document.createElement('button');
                    btn.className = `pilihan-btn ${jawabanUser[idxSkg] === i ? 'active': ''}`;
                    btn.innerText = `${String.fromCharCode(65+i)}. ${teks}`;
                    btn.onclick = () => simpanPG(i);
                    container.appendChild(btn);
                });
                opsiArea.appendChild(container);
            } else {
                const container = document.createElement('div');
                container.className = "pilihan-container";
                if (!jawabanUser[idxSkg]) jawabanUser[idxSkg] = [];

                soal.a.forEach((teks, i) => {
                    const div = document.createElement('div');
                    const tercentang = jawabanUser[idxSkg].includes(i);
                    div.className = `pilihan-item ${tercentang ? 'selected': ''}`;
                    div.innerHTML = `<input type="checkbox" ${tercentang ? 'checked': ''}> ${String.fromCharCode(65+i)}. ${teks}`;
                    div.onclick = () => simpanMulti(i);
                    container.appendChild(div);
                });
                opsiArea.appendChild(container);
            }

            // Navigasi
            document.getElementById('btn-prev').style.visibility = idxSkg === 0 ? 'hidden': 'visible';
            document.getElementById('btn-next').classList.toggle('hidden', idxSkg === total - 1);
            document.getElementById('btn-finish').classList.toggle('hidden', idxSkg !== total - 1);
        }

        function simpanBS(val) {
            jawabanUser[idxSkg] = val; geser(1);
        }
        function simpanPG(val) {
            jawabanUser[idxSkg] = val; geser(1);
        }
        function simpanMulti(i) {
            const arr = jawabanUser[idxSkg];
            const p = arr.indexOf(i);
            if (p === -1) arr.push(i); else arr.splice(p, 1);
            renderSoal();
        }

        function geser(n) {
            const total = bankSoal[modeAktif].length;
            idxSkg += n;
            if (idxSkg < 0) idxSkg = 0;
            if (idxSkg >= total) idxSkg = total - 1;
            renderSoal();
        }

        function hitungHasil() {
            let benar = 0;
            const data = bankSoal[modeAktif];

            data.forEach((s, i) => {
                if (modeAktif === 'benar-salah') {
                    if (jawabanUser[i] === s.a) benar++;
                } else if (modeAktif === 'pilihan-ganda') {
                    if (jawabanUser[i] === s.c) benar++;
                } else {
                    const u = (jawabanUser[i] || []).sort().join(',');
                    const k = s.c.sort().join(',');
                    if (u === k) benar++;
                }
            });

            document.getElementById('quiz-content').classList.add('hidden');
            document.getElementById('hasil-area').classList.remove('hidden');
            document.getElementById('skor-display').innerText = Math.round((benar/data.length)*100);

            // Render Review sederhana
            const list = document.getElementById('review-list');
            list.innerHTML = "<h3>Review Singkat:</h3>";
            data.forEach((s, i) => {
                const isCorrect = (modeAktif === 'benar-salah' && jawabanUser[i] === s.a) ||
                (modeAktif === 'pilihan-ganda' && jawabanUser[i] === s.c) ||
                (modeAktif === 'multi-jawaban' && (jawabanUser[i] || []).sort().join(',') === s.c.sort().join(','));

                list.innerHTML += `<div class="review-card" style="border-left:5px solid ${isCorrect ? '#16a34a': '#dc2626'}">
                <strong>No ${i+1}:</strong> ${isCorrect ? 'Tepat': 'Salah'}<br>
                <small>${s.q}</small>
                </div>`;
            });
        }

        function resetQuiz() {
            switchTab(modeAktif);
        }

        // Jalankan pertama kali
        renderSoal();
    </script>

</body>
</html>
