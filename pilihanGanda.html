        }
        .container {
            max-width: 850px;

            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
        }
        header {

            margin-bottom: 20px;
            padding-bottom: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .stats {
            font-weight: 700;
            color: var(--primary);
            background: #eff6ff;
            padding: 5px 15px;
            border-radius: 20px;
        }
        .pertanyaan {
            font-size: 1.25rem;
            font-weight: 600;
            margin-bottom: 20px;
        }
        .pilihan-container {
            display: grid;
            gap: 10px;
        }
        .pilihan-btn {
            padding: 15px;
            border: 2px solid #e2e8f0;
            border-radius: 10px;
            background: white;
            cursor: pointer;
            text-align: left;
            transition: 0.2s;
        }
        .pilihan-btn.correct {
            background: #dcfce7 !important;
            border-color: var(--success) !important;
            color: #166534;
            font-weight: bold;
        }
        .pilihan-btn.wrong {
            background: #fee2e2 !important;
            border-color: var(--danger) !important;
            color: #991b1b;
        }
        .footer-nav {
            margin-top: 30px;
            display: flex;
            gap: 10px;
            border-top: 2px solid #f1f5f9;
            padding-top: 20px;
        }
        button.nav-btn {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
        }
        .prev-btn {
            background: #e2e8f0;
        }
        .next-btn {
            background: var(--primary);
            color: white;
        }

        /* Skor & Review Section */
        #hasil-akhir {
            display: none;
        }
        .skor-besar {
            font-size: 4rem;
            font-weight: 800;
            color: var(--primary);
            text-align: center;
        }
        .evaluasi-title {
            margin-top: 40px;
            padding: 10px;
            background: #fff1f2;
            color: #be123c;
            border-radius: 8px;
            text-align: center;
            font-weight: bold;
        }
        .review-card {
            border: 1px solid #e2e8f0;
            padding: 15px;
            border-radius: 10px;
            margin-top: 15px;
            background: #fff;
        }
        .review-q {
            font-weight: 600;
            margin-bottom: 10px;
        }
        .ans-box {
            padding: 10px;
            border-radius: 6px;
            margin: 5px 0;
            font-size: 0.9rem;
        }
        .user-wrong {
            background: #fee2e2;
            color: #991b1b;
            border: 1px solid #fecaca;
        }
        .correct-fix {
            background: #dcfce7;
            color: #166534;

        let jawabanUser = new Array(dataSoal.length).fill(null);
        let idxSkg = 0;

        function tampilkanSoal() {
            const s = dataSoal[idxSkg];
            document.getElementById("stats-soal").innerText = `${idxSkg + 1} / ${dataSoal.length}`;
            document.getElementById("teks-pertanyaan").innerText = s.q;

            const container = document.getElementById("container-jawaban");
            container.innerHTML = "";

            s.a.forEach((pil, i) => {
                const btn = document.createElement("button");
                btn.className = "pilihan-btn";
                btn.innerText = `${String.fromCharCode(65 + i)}. ${pil}`;

                // Jika sudah dijawab, tampilkan feedback visual
                if (jawabanUser[idxSkg] !== null) {
                    btn.disabled = true;
                    if (i === s.c) btn.classList.add("correct");
                    if (i === jawabanUser[idxSkg] && i !== s.c) btn.classList.add("wrong");
                }

                btn.onclick = () => pilihJawaban(i);
                container.appendChild(btn);
            });

            document.getElementById("btn-prev").style.visibility = idxSkg === 0 ? "hidden": "visible";
            document.getElementById("btn-next").style.display = idxSkg === dataSoal.length - 1 ? "none": "block";
            document.getElementById("btn-finish").style.display = idxSkg === dataSoal.length - 1 ? "block": "none";
        }

        function pilihJawaban(i) {
            if (jawabanUser[idxSkg] !== null) return;
            jawabanUser[idxSkg] = i;
            tampilkanSoal();
        }

        function geserSoal(n) {
            idxSkg += n;
            tampilkanSoal();
        }

        function tampilkanHasil() {
            let benarCount = 0;
            let listSalah = [];

            dataSoal.forEach((s, i) => {
                if (jawabanUser[i] === s.c) {
                    benarCount++;
                } else {
                    listSalah.push({
                        no: i + 1,
                        pertanyaan: s.q,
                        pilihanUser: jawabanUser[i] !== null ? s.a[jawabanUser[i]]: "Tidak Dijawab",
                        pilihanBenar: s.a[s.c]
                    });
                }
            });

            document.getElementById("quiz-section").style.display = "none";
            document.getElementById("hasil-akhir").style.display = "block";
            document.getElementById("skor-angka").innerText = Math.round((benarCount / dataSoal.length) * 100);

            const evalContainer = document.getElementById("target-evaluasi");
            evalContainer.innerHTML = "";

            if (listSalah.length > 0) {
                evalContainer.innerHTML = `<div class="evaluasi-title">
                DAFTAR EVALUASI (SOAL YANG SALAH)
                </div>
                `;
                listSalah.forEach(item => {
                    const card = document.createElement("div");
                    card.className = "review-card";
                    card.innerHTML = `
                    <div class="review-q">
                    ${item.no}. ${item.pertanyaan}
                    </div>
                    <div class="ans-box user-wrong">
                    Jawaban Anda: ${item.pilihanUser}
                    </div>
                    <div class="ans-box correct-fix">
                    Jawaban Benar: ${item.pilihanBenar}
                    </div>
                    `;
                    evalContainer.appendChild(card);
                });
            } else {
                evalContainer.innerHTML = `<div class="evaluasi-title" style="background:#dcfce7; color:#166534;">
                Luar Biasa! Tidak ada jawaban yang salah.
                </div>
                `;
            }
        }

        tampilkanSoal();
    </script>
</body>
</html>
