    }
        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            margin: 0;
            padding: 0;
        }
        /* Style Navigasi Utama */
        .main-nav {
            background: #fff;
            padding: 15px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            position: sticky;
            top: 0;
            z-index: 100;
            display: flex;
            justify-content: center;
            gap: 10px;
        }
        .nav-btn {
            padding: 10px 15px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            background: #e2e8f0;
            transition: 0.3s;
        }
        .nav-btn.active {
            background: var(--primary);
            color: white;
        }

        .container {
            max-width: 850px;
            margin: 20px auto;
            background: white;
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            display: none;
            /* Sembunyikan semua konten di awal */
        }
        .container.active {
            display: block;
        }

        /* Style bersama untuk semua tipe soal */
        .header-soal {
            border-bottom: 2px solid #eee;
            padding-bottom: 10px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
        }
        .pertanyaan {
            font-size: 1.2rem;
            font-weight: 600;
            margin-bottom: 20px;
        }
        .pilihan-container {
            display: grid;
            gap: 10px;
        }
        .pilihan-btn, .pilihan-item {
            padding: 15px;
            border: 2px solid #e2e8f0;
            border-radius: 10px;
            background: white;
            cursor: pointer;
            text-align: left;
            transition: 0.2s;
        }

        /* Utility CSS */
        .correct {
            background: #dcfce7 !important;
            border-color: var(--success) !important;
            color: #166534;
            font-weight: bold;
        }
        .wrong {
            background: #fee2e2 !important;
            border-color: var(--danger) !important;
            color: #991b1b;
        }
        .footer-nav {
            margin-top: 30px;
            display: flex;
            gap: 10px;
            border-top: 1px solid #eee;
            padding-top: 20px;
        }
        .btn-action {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
        }
        .skor-angka {
            font-size: 4rem;
            font-weight: 900;
            color: var(--primary);
            text-align: center;
        }

        let pgIdx = 0;

            const s = dataPG[pgIdx];
            document.getElementById("pg-stats").innerText = `${pgIdx + 1} / ${dataPG.length}`;
            document.getElementById("pg-teks").innerText = s.q;
            const cont = document.getElementById("pg-opsi");
            cont.innerHTML = "";
            s.a.forEach((opt, i) => {
                const b = document.createElement("button");
                b.className = "pilihan-btn";
                b.innerText = `${String.fromCharCode(65+i)}. ${opt}`;
                if (pgJawabanUser[pgIdx] !== null) {
                    b.disabled = true;
                    if (i === s.c) b.classList.add("correct");
                    if (i === pgJawabanUser[pgIdx] && i !== s.c) b.classList.add("wrong");
                }
                b.onclick = () => {
                    pgJawabanUser[pgIdx] = i; pgTampilkan();
                };
                cont.appendChild(b);
            });
            document.getElementById("pg-next-btn").style.display = pgIdx === dataPG.length-1 ? "none": "block";
            document.getElementById("pg-finish-btn").style.display = pgIdx === dataPG.length-1 ? "block": "none";

            pgIdx += n; pgTampilkan();

                const d = document.createElement("div");
                const cek = mJawabanUser[mIdx].includes(i);
                d.className = `pilihan-item ${cek ? 'correct': ''}`;
                d.innerHTML = `<input type="checkbox" ${cek ? 'checked': ''}> ${opt}`;
                d.onclick = () => {
                    let pos = mJawabanUser[mIdx].indexOf(i);
                    if (pos === -1) mJawabanUser[mIdx].push(i); else mJawabanUser[mIdx].splice(pos, 1);
                    multiTampilkan();
                };
                cont.appendChild(d);
            });
            document.getElementById("multi-next-btn").style.display = mIdx === dataMulti.length-1 ? "none": "block";
            document.getElementById("multi-finish-btn").style.display = mIdx === dataMulti.length-1 ? "block": "none";
        }
        function multiGeser(n) {
            mIdx += n; multiTampilkan();
        }
        function multiHint() {
            const items = document.querySelectorAll('#multi-opsi .pilihan-item');
            dataMulti[mIdx].c.forEach(idx => items[idx].style.borderColor = "var(--success)");
        }
        function multiSelesai() {
            let benar = 0;
            dataMulti.forEach((s, i) => {
                if (mJawabanUser[i].sort().join(',') === s.c.sort().join(',')) benar++;
            });
            document.getElementById("multi-quiz-section").style.display = "none";
            document.getElementById("multi-hasil").style.display = "block";
            document.getElementById("multi-skor-display").innerText = Math.round((benar/dataMulti.length)*100);
        }

        // LOGIKA BENAR SALAH
        let bsIdx = 0;
        let bsSkor = 0;
        let bsProgres = 0;
        function bsTampilkan() {
            document.getElementById("bs-stats").innerText = `${bsIdx + 1} / ${dataBS.length}`;
            document.getElementById("bs-teks").innerText = dataBS[bsIdx].q;
            document.getElementById("bs-box").style.background = "#f8fafc";
            document.getElementById("bs-next-btn").disabled = bsIdx >= bsProgres;
        }
        function bsCek(jawab) {
            if (jawab === dataBS[bsIdx].a) {
                document.getElementById("bs-box").style.background = "#dcfce7";
                if (bsIdx === bsProgres) {
                    bsSkor++; bsProgres++;
                }
                document.getElementById("bs-next-btn").disabled = false;
                setTimeout(bsLanjut, 600);
            } else {
                document.getElementById("bs-box").style.background = "#fee2e2";
                alert("Salah!");
            }
        }
        function bsLanjut() {
            if (bsIdx < dataBS.length-1) {
                bsIdx++; bsTampilkan();
            } else {
                document.getElementById("bs-quiz-section").style.display = "none";
                document.getElementById("bs-hasil").style.display = "block";
                document.getElementById("bs-skor-display").innerText = Math.round((bsSkor/dataBS.length)*100);
            }
        }
        function bsKembali() {
            if (bsIdx > 0) {
                bsIdx--; bsTampilkan();
            }
        }

        // Inisialisasi awal
        pgTampilkan();
        multiTampilkan();
        bsTampilkan();
    </script>
</body>
</html>
